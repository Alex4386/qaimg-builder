name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (format: vYYYY.MM.DD)'
        required: false
  schedule:
    - cron: "0 0 * * */7" # Every 7 days at 00:00 UTC
  
jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        codename: [resolute, noble, jammy, focal]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-utils parted wget cloud-guest-utils e2fsprogs
    
    - name: Build Ubuntu ${{ matrix.codename }} image
      run: |
        cd builders
        chmod +x ubuntu.sh
        ./ubuntu.sh ${{ matrix.codename }}
    
    - name: Upload Ubuntu ${{ matrix.codename }} artifact
      uses: actions/upload-artifact@v4
      with:
        name: ubuntu-${{ matrix.codename }}-qa-image
        path: builders/${{ matrix.codename }}-server-cloudimg-amd64-qa.img
        retention-days: 1

  build-debian:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        codename: [bookworm, bullseye, trixie]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-utils parted wget cloud-guest-utils e2fsprogs
    
    - name: Build Debian ${{ matrix.codename }} image
      run: |
        cd builders
        chmod +x debian.sh
        ./debian.sh ${{ matrix.codename }}
    
    - name: Upload Debian ${{ matrix.codename }} artifact
      uses: actions/upload-artifact@v4
      with:
        name: debian-${{ matrix.codename }}-qa-image
        path: builders/${{ matrix.codename }}-generic-amd64-qa.qcow2
        retention-days: 1

  build-debian-flavors:
    needs: build-debian
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor:
          - generic
          - nginx
          - nodejs
          - wireguard
          - docker
          - grafana
          - mariadb
          - postgresql
          - minecraft-vanilla
          - minecraft-paper
          - palworld
          - openclaw
          - prometheus
          - elasticsearch
          - strapi
          - gitlab
          - coolify
          - supabase
    steps:
    - uses: actions/checkout@v4

    - name: Set up dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-utils parted wget cloud-guest-utils e2fsprogs

    - name: Download Debian Bookworm base image
      uses: actions/download-artifact@v4
      with:
        name: debian-bookworm-qa-image
        path: base-image

    - name: Build Debian Bookworm ${{ matrix.flavor }} image
      run: |
        BASE_IMAGE="$GITHUB_WORKSPACE/base-image/bookworm-generic-amd64-qa.qcow2" \
        OUTPUT_DIR="$GITHUB_WORKSPACE/output" \
          ./flavors/build.sh debian "${{ matrix.flavor }}" bookworm
        qemu-img check "output/bookworm-generic-amd64-qa.${{ matrix.flavor }}.qcow2"

    - name: Upload Debian Bookworm ${{ matrix.flavor }} artifact
      uses: actions/upload-artifact@v4
      with:
        name: debian-bookworm-${{ matrix.flavor }}-qa-image
        path: output/bookworm-generic-amd64-qa.${{ matrix.flavor }}.qcow2
        if-no-files-found: error
        retention-days: 1
        compression-level: 0

  build-rocky:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['10', '9']
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-utils parted wget cloud-guest-utils e2fsprogs
    
    - name: Build Rocky Linux ${{ matrix.version }} image
      run: |
        cd builders
        chmod +x rocky.sh
        ./rocky.sh ${{ matrix.version }}
    
    - name: Upload Rocky Linux ${{ matrix.version }} artifact
      uses: actions/upload-artifact@v4
      with:
        name: rocky-${{ matrix.version }}-qa-image
        path: builders/rockylinux-${{ matrix.version }}-GenericCloud.latest-qa.qcow2
        retention-days: 1

  build-alma:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['10', '9']
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-utils parted wget cloud-guest-utils e2fsprogs
    
    - name: Build AlmaLinux ${{ matrix.version }} image
      run: |
        cd builders
        chmod +x alma.sh
        ./alma.sh ${{ matrix.version }}
    
    - name: Upload AlmaLinux ${{ matrix.version }} artifact
      uses: actions/upload-artifact@v4
      with:
        name: alma-${{ matrix.version }}-qa-image
        path: builders/AlmaLinux-${{ matrix.version }}-GenericCloud-latest-qa.x86_64.qcow2
        retention-days: 1

  build-arch:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-utils parted wget cloud-guest-utils e2fsprogs
    
    - name: Build Arch Linux image
      run: |
        cd builders
        chmod +x arch.sh
        ./arch.sh
    
    - name: Upload Arch Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: arch-qa-image
        path: builders/Arch-Linux-x86_64-cloudimg-qa.qcow2
        retention-days: 1

  create-release:
    needs: [build-ubuntu, build-debian, build-debian-flavors, build-rocky, build-alma, build-arch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts
    
    # Install qemu-img for compression and checksum generation
    # - name: Install qemu-utils
    #   run: |
    #     sudo apt-get update
    #     sudo apt-get install -y qemu-utils

    # - name: Compress and create checksums
    #   run: |
    #     cd release-artifacts
    #     # Compress qcow2 files using qemu-img
    #     find . -type f -name "*.qcow2" | while read file; do
    #       echo "Compressing $file with qemu-img..."
    #       qemu-img convert -c -O qcow2 "$file" "${file}.compressed"
    #       mv "${file}.compressed" "$file"
    #     done
        
    #     # Create checksums for all image files
    #     find . -type f -name "*.img" -o -name "*.qcow2" | while read file; do
    #       sha256sum "$file" > "$file.sha256"
    #     done

    - name: Set release tag
      id: set_tag
      run: |
        if [[ "${{ github.event_name }}" == "push" ]]; then
          echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
        elif [[ -n "${{ github.event.inputs.tag_name }}" ]]; then
          echo "tag_name=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
        else
          # Generate base tag with current date
          base_tag="v$(date +%Y.%m.%d)"
          
          # Check if tag already exists
          if gh release view "$base_tag" >/dev/null 2>&1; then
            # Find the next available number
            counter=2
            while gh release view "${base_tag}-${counter}" >/dev/null 2>&1; do
              ((counter++))
            done
            echo "tag_name=${base_tag}-${counter}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${base_tag}" >> "$GITHUB_OUTPUT"
          fi
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.set_tag.outputs.tag_name }}
        release_name: Release ${{ steps.set_tag.outputs.tag_name }}
        body: |
          ## Cloud Images with qemu-guest-agent

          This release contains cloud images with qemu-guest-agent pre-installed for better integration with virtualization platforms.

          ### Supported Distributions
          - Ubuntu: Resolute (26.04), Noble (24.04), Jammy (22.04), Focal (20.04)
          - Debian: Trixie (13), Bookworm (12), Bullseye (11)
          - Debian Bookworm flavors: Nginx, Node.js, WireGuard, Docker, Grafana OSS, MariaDB, PostgreSQL, Minecraft Vanilla, Minecraft Paper
          - Rocky Linux: 10, 9
          - AlmaLinux: 10, 9
          - Arch Linux: Latest

          ### Usage
          These images can be used with any virtualization platform that supports qcow2 format, including:
          - Proxmox VE
          - OpenStack
          - KVM/QEMU
          - And more...

          ### Checksums
          SHA256 checksums are provided for each image file.
        draft: false
        prerelease: false

    - name: Upload Release Assets
      run: |
        cd release-artifacts
        for artifact_dir in */; do
          for file in "$artifact_dir"*.{img,qcow2,sha256}; do
            if [[ -f "$file" ]]; then
              # Check file size (2GB = 2147483648 bytes)
              file_size=$(stat -c%s "$file")
              asset_name=$(basename "$file")
              
              if [[ $file_size -gt 2147483648 ]]; then
                echo "::warning title=Asset skipped::$asset_name ($file_size bytes) exceeds the 2GB release asset limit and was not uploaded"
              else
                echo "Uploading $asset_name (size: $file_size bytes)..."
                gh release upload "${{ steps.set_tag.outputs.tag_name }}" "$file" --clobber
              fi
            fi
          done
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
